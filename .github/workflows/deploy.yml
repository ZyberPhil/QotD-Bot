name: Build & Deploy QotD Bot

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/zyberphil/qotd-bot

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Update Docker Compose
        run: |
          set -e
          mkdir -p /opt/qotd-bot
          cd /opt/qotd-bot

          # 1. Write the .env file from GitHub Secrets
          cat > .env << 'EOF'
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID=${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CHANNEL_ID=${{ secrets.DISCORD_CHANNEL_ID }}
          POST_TIME=${{ secrets.POST_TIME }}
          TIMEZONE=Europe/Berlin
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

          # 2. Write the docker-compose.yml file
          cat > docker-compose.yml << 'EOF'
          services:
            qotd-bot:
              image: ${{ env.IMAGE_NAME }}:latest
              container_name: qotd-bot
              restart: unless-stopped
              depends_on:
                postgres:
                  condition: service_healthy
              environment:
                ASPNETCORE_ENVIRONMENT: Production
                ASPNETCORE_URLS: http://+:8080
                TZ: Europe/Berlin
                Discord__Token: ${DISCORD_TOKEN}
                Discord__GuildId: ${DISCORD_GUILD_ID}
                Discord__ChannelId: ${DISCORD_CHANNEL_ID}
                Scheduling__PostTime: ${POST_TIME:-07:00}
                Scheduling__Timezone: ${TIMEZONE:-Europe/Berlin}
                ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=qotd;Username=qotd;Password=${POSTGRES_PASSWORD}
              ports:
                - "8080:8080"
              volumes:
                - ./logs:/app/logs
              networks:
                - qotd-net

            postgres:
              image: postgres:17-alpine
              container_name: qotd-postgres
              restart: unless-stopped
              environment:
                POSTGRES_DB: qotd
                POSTGRES_USER: qotd
                POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                TZ: Europe/Berlin
              volumes:
                - postgres_data:/var/lib/postgresql/data
              networks:
                - qotd-net
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U qotd -d qotd"]
                interval: 10s
                timeout: 5s
                retries: 5
                start_period: 10s

          volumes:
            postgres_data:
              driver: local

          networks:
            qotd-net:
              driver: bridge
          EOF

          # 3. Pull and restart
          docker compose pull
          docker compose up -d --remove-orphans

          # 4. Clean up old images
          docker image prune -f

          echo "✅ Deployment complete."
