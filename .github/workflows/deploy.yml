name: Build & Deploy QotD Bot

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/zyberphil/qotd-bot

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Update Docker Compose
        run: |
          set -e
          mkdir -p /opt/qotd-bot
          cd /opt/qotd-bot

          # Copy docker-compose from the build context
          # (Note: In a self-hosted runner, the workspace might be cleaned, 
          # so we ensure we have the necessary files)
          
          cat > .env << 'EOF'
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID=${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CHANNEL_ID=${{ secrets.DISCORD_CHANNEL_ID }}
          POST_TIME=${{ secrets.POST_TIME }}
          TIMEZONE=Europe/Berlin
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

          # Pull the latest image and restart
          docker compose pull qotd-bot
          docker compose up -d --remove-orphans

          # Clean up old images
          docker image prune -f

          echo "✅ Deployment complete."
